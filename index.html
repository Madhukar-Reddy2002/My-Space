<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Space</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .button {
            display: inline-block;
            font-size: 18px;
            color: #fff;
            background: #5CB85C;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #4cae4c;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Space</h1>
    </header>
    <div class="container">
        <p>This is an improved version of the webpage with enhanced content and UI.</p>
        <a href="#" class="button">Get Started</a>
    </div>
</body>
</html>
